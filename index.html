<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>C-Hub</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ActuallyDigitsofpi314159/CerneyHub@main/stylingPart.css">
</head>
<body>
  <div class="grid-bg"></div>

  <div id="pw-gate">
    <div class="pw-logo">The C-Hub</div>
    <div class="pw-sub">Protected launcher entry.</div>
    <div class="pw-box">
      <div class="pw-label">ENTER PASSWORD</div>
      <input id="pw-input" type="password" maxlength="32" placeholder="it's not 67" autocomplete="off" spellcheck="false" />
      <button id="pw-btn" type="button">ENTER</button>
      <div id="pw-error"></div>
    </div>
  </div>

  <div id="launch-screen" class="hidden">
    <div class="launch-panel">
      <div class="launch-title">C-Hub</div>
      <p class="launch-text">Password accepted. Open the clean launcher in a new window.</p>
      <button id="launch-btn" type="button">Launch</button>
      <p class="launch-note">The launcher window is the real home screen. Keep this page open so you can return.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/ActuallyDigitsofpi314159/CerneyHub@main/logicPart.js"></script>
</body>
</html>
