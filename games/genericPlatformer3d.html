            border: none;

            color: #fff;

<script>
var canvas = document.getElementById('game-canvas');
var scene = new THREE.Scene();

renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.shadowMap.autoUpdate = true;
document.body.appendChild(renderer.domElement);

// Graphics mode: 'fancy' (default) or 'fast'
var graphicsMode = 'fancy';
function applyGraphicsMode(mode){
    graphicsMode = mode || graphicsMode;
  
    // Save graphics mode so preference sticks.
    try { 
        localStorage.setItem('pf_graphicsMode', graphicsMode);
    } catch(e){
        console.warn(e);
    }
  
    // Dispose old renderer.
    renderer.dispose();
  
    // Swap the canvas for a fresh one.
    var oldCanvas = canvas;
    var newCanvas = document.createElement('canvas');
    newCanvas.id = 'game-canvas';
    oldCanvas.parentNode.replaceChild(newCanvas, oldCanvas);
    canvas = newCanvas;
  
    // Make a new renderer; antialias depends on mode.
    var newRenderer = new THREE.WebGLRenderer({
        antialias: (graphicsMode === 'fancy'),
        canvas: canvas,
        preserveDrawingBuffer: true
    });
    newRenderer.setSize(window.innerWidth, window.innerHeight);
    newRenderer.setPixelRatio(graphicsMode === 'fancy' ? (window.devicePixelRatio || 1) : 1);
  
	if(graphicsMode === 'fancy'){
       newRenderer.shadowMap.enabled = true;
       newRenderer.shadowMap.type = THREE.PCFSoftShadowMap;
       newRenderer.shadowMap.autoUpdate = true;
    } else {
        newRenderer.shadowMap.enabled = false;
    }
  
	renderer = newRenderer;
}

// OBB collision helpers
function OBB(center, halfExtents, axes) {
    this.center = center || new THREE.Vector3();
    this.halfExtents = halfExtents || new THREE.Vector3(0.5, 0.5, 0.5);
    this.axes = axes || [new THREE.Vector3(1,0,0), new THREE.Vector3(0,1,0), new THREE.Vector3(0,0,1)];
}

function updateOBBFromMesh(obb, mesh) {
    obb.center.copy(mesh.position);
    var matWorld = mesh.matrixWorld;
    var xAxis = new THREE.Vector3(1, 0, 0).applyMatrix4(matWorld);
    var yAxis = new THREE.Vector3(0, 1, 0).applyMatrix4(matWorld);
    var zAxis = new THREE.Vector3(0, 0, 1).applyMatrix4(matWorld);
    xAxis.sub(mesh.position).normalize();
    yAxis.sub(mesh.position).normalize();
    zAxis.sub(mesh.position).normalize();
    obb.axes[0].copy(xAxis);
    obb.axes[1].copy(yAxis);
    obb.axes[2].copy(zAxis);
}

function projectOBBOnAxis(obb, axis) {
    var extentX = Math.abs(obb.halfExtents.x * Math.abs(obb.axes[0].dot(axis)));
    var extentY = Math.abs(obb.halfExtents.y * Math.abs(obb.axes[1].dot(axis)));
    var extentZ = Math.abs(obb.halfExtents.z * Math.abs(obb.axes[2].dot(axis)));
    var extent = extentX + extentY + extentZ;
    var centerProj = obb.center.dot(axis);
    return {
        min: centerProj - extent, max: centerProj + extent
    };
}

function intervalsOverlap(p1, p2) {
    return p1.max >= p2.min && p2.max >= p1.min;
}

function testOBBOBBSAT(obb1, obb2) {
    var axes = [];
    for(var i = 0; i < 3; i++) axes.push(obb1.axes[i]);
    for(var i = 0; i < 3; i++) axes.push(obb2.axes[i]);
  
    for(var i = 0; i < axes.length; i++) {
        var axis = axes[i];
        if(axis.lengthSq() < 0.001) continue;
        var p1 = projectOBBOnAxis(obb1, axis);
        var p2 = projectOBBOnAxis(obb2, axis);
        if(!intervalsOverlap(p1, p2)) return false;
  	}
  	return true;
}

function getOBBVertices(obb) {
    var verts = [];
    var c = obb.center;
    var ax = obb.axes[0].clone().multiplyScalar(obb.halfExtents.x);
 	var ay = obb.axes[1].clone().multiplyScalar(obb.halfExtents.y);
 	var az = obb.axes[2].clone().multiplyScalar(obb.halfExtents.z);
  
	for(var i = 0; i < 8; i++) {
        var v = c.clone();
        if(i & 1) v.add(ax); else v.sub(ax);
        if(i & 2) v.add(ay); else v.sub(ay);
        if(i & 4) v.add(az); else v.sub(az);
        verts.push(v);
  	}
  	return verts;
}

function getOBBPenetration(obb1, obb2) {
  	var minPenetration = Infinity;
 	var penetrationAxis = null;
  
 	var axes = [];
    for(var i = 0; i < 3; i++) axes.push(obb1.axes[i]);
	for(var i = 0; i < 3; i++) axes.push(obb2.axes[i]);
  
	for(var i = 0; i < axes.length; i++) {
        var axis = axes[i];
        if(axis.lengthSq() < 0.001) continue;
        axis = axis.clone().normalize();
        
        var p1 = projectOBBOnAxis(obb1, axis);
        var p2 = projectOBBOnAxis(obb2, axis);
        
        if(!intervalsOverlap(p1, p2)) return null;
        
        var penetration = Math.min(p1.max - p2.min, p2.max - p1.min);
    	if(penetration < minPenetration) {
            minPenetration = penetration;
            penetrationAxis = axis.clone();
            if(p1.max - p2.min < p2.max - p1.min) {
                penetrationAxis.multiplyScalar(-1);
            }
    	}
	}
  
	return {depth: minPenetration, axis: penetrationAxis};
}

function testAABBAABB(min1, max1, min2, max2) {
  return min1.x <= max2.x && max1.x >= min2.x &&
         min1.y <= max2.y && max1.y >= min2.y &&
         min1.z <= max2.z && max1.z >= min2.z;
}

// for the goal
function testSphereOBB(sphereCenter, sphereRadius, obb) {
  var closest = sphereCenter.clone();
  for(var i = 0; i < 3; i++) {
    var axisProj = closest.dot(obb.axes[i]) - obb.center.dot(obb.axes[i]);
    var clamp = Math.max(-obb.halfExtents.getComponent(i), Math.min(obb.halfExtents.getComponent(i), axisProj));
    closest.addScaledVector(obb.axes[i], clamp - axisProj);
  }
  var dist = sphereCenter.distanceTo(closest);
  return {hit: dist <= sphereRadius, closest: closest, dist: dist};
}

var platforms = [];

// Convert RGB array or hex/number to a THREE color int
function normalizeColor(c){
    if(!c) return null;
  	if(Object.prototype.toString.call(c) === '[object Array]'){
        var r = Math.max(0, Math.min(255, Math.floor(c[0]||0)));
        var g = Math.max(0, Math.min(255, Math.floor(c[1]||0)));
        var b = Math.max(0, Math.min(255, Math.floor(c[2]||0)));
        return (r<<16) | (g<<8) | b;
    }
    if(typeof c === 'string'){
		if(c[0] === '#') c = c.substring(1);
		return parseInt(c, 16);
	}
    return c;
}

/* Block creator
createBlock({ x,y,z, w,h,d, rotX,rotY,rotZ, color, specialType, moveType, targetX/Y/Z, targetRotX/Y/Z, speed, duration })
- rotX/Y/Z and targetRotX/Y/Z are in degrees in the level data (converted to radians later)
- color: either [r,g,b] array or hex/number/string
- specialType: 'lava' or 'trampoline' (overrides color), or 'text'
- moveType: 'moving_normal' (constant speed bouncing) or 'moving_smooth' (ease in/out)
- targetX/Y/Z: target position for moving platforms
- targetRotX/Y/Z: rotation targets (degrees) for moving platforms
- speed: speed (units/sec) of moving platforms
*/
function createBlock(opts){
	// opts must be an object
  	if(!opts || typeof opts !== 'object') return null;
  	var ox = opts.x || 0, oy = opts.y || 0, oz = opts.z || 0;
  	var ow = opts.w || opts.width || 1, oh = opts.h || opts.height || 1, od = opts.d || opts.depth || 1;
  	var orx = opts.rotX || 0, ory = opts.rotY || 0, orz = opts.rotZ || 0;
  	var ocolor = opts.color || opts.col || null;
  	var ospecial = opts.specialType || null;

    // 3d text
    if(ospecial === 'text'){
        var msg = opts.message || opts.text || 'Message';
        var fontSize = Math.max(16, (opts.fontSize || 48));
        var padding = 40;
        
        var measureCanvas = document.createElement('canvas');
        var measureCtx = measureCanvas.getContext('2d');
        measureCtx.font = fontSize + 'px sans-serif';
        var textWidth = Math.ceil(measureCtx.measureText(msg).width);
        var canvasW = textWidth + padding * 2;
        var canvasH = fontSize + padding * 2;
        var canvasTxt = document.createElement('canvas');
        var dpr = window.devicePixelRatio || 1;
        canvasTxt.width = Math.max(1, Math.ceil(canvasW * dpr));
        canvasTxt.height = Math.max(1, Math.ceil(canvasH * dpr));
        
        canvasTxt.style.width = canvasW + 'px';
        canvasTxt.style.height = canvasH + 'px';
        var ctx = canvasTxt.getContext('2d');
        ctx.scale(dpr, dpr);
        ctx.fillStyle = 'rgba(0,0,0,0)';
        ctx.fillRect(0, 0, canvasW, canvasH);
        ctx.font = fontSize + 'px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = (opts.fontColor) ? ('rgb(' + (opts.fontColor[0]||255) + ',' + (opts.fontColor[1]||255) + ',' + (opts.fontColor[2]||255) + ')') : '#fff';
        ctx.fillText(msg, canvasW/2, canvasH/2);
        
        var finalCanvas = canvasTxt;
        var finalCanvasW = canvasW;
        var finalCanvasH = canvasH;
        
        var pxPerUnit = (opts.pxPerUnit && opts.pxPerUnit > 0) ? opts.pxPerUnit : 100;
        var planeW, planeH;
        
        if (opts.keepPlaneSize && opts.w && opts.w > 0 && opts.h && opts.h > 0) {
            // Both plane dims provided: ensure texture matches that aspect ratio
            var planeAspect = opts.w / opts.h;
            var canvasAspect = canvasW / canvasH;
            if (Math.abs(canvasAspect - planeAspect) > 1e-3) {
                var outW = canvasW, outH = canvasH;
                if (planeAspect > canvasAspect) {
                    outW = Math.ceil(canvasH * planeAspect);
                    outH = canvasH;
                } else {
                    outW = canvasW;
                    outH = Math.ceil(canvasW / planeAspect);
                }
                var outCanvas = document.createElement('canvas');
                outCanvas.width = Math.max(1, Math.ceil(outW * dpr));
                outCanvas.height = Math.max(1, Math.ceil(outH * dpr));
                outCanvas.style.width = outW + 'px';
                outCanvas.style.height = outH + 'px';
                var outCtx = outCanvas.getContext('2d');
                outCtx.scale(dpr, dpr);
                outCtx.clearRect(0, 0, outW, outH);
                var dx = Math.round((outW - canvasW) / 2);
                var dy = Math.round((outH - canvasH) / 2);
                outCtx.drawImage(canvasTxt, 0, 0, canvasTxt.width, canvasTxt.height, dx, dy, canvasW, canvasH);
                finalCanvas = outCanvas;
                finalCanvasW = outW;
                finalCanvasH = outH;
            }
            planeW = opts.w;
            planeH = opts.h;
        } else if (opts.keepPlaneSize && opts.w && opts.w > 0) {
            // Only width provided: compute height to preserve text aspect
            planeW = opts.w;
            planeH = planeW / (canvasW / canvasH);
        } else if (opts.h && opts.h > 0) {
            // Only height provided: compute width to preserve text aspect
            planeH = opts.h;
            planeW = planeH * (canvasW / canvasH);
        } else {
            planeW = canvasW / pxPerUnit;
            planeH = canvasH / pxPerUnit;
        }
        var tex = new THREE.CanvasTexture(finalCanvas);
        tex.needsUpdate = true;
        var mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide });
        var geo = new THREE.PlaneGeometry(planeW, planeH);
        var mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(ox, oy, oz);
        mesh.rotation.set(THREE.MathUtils.degToRad(orx) || 0, THREE.MathUtils.degToRad(ory) || 0, THREE.MathUtils.degToRad(orz) || 0);
        mesh.renderOrder = 999;
        scene.add(mesh);
        decorations.push({mesh:mesh, opts:opts});
        return mesh;
    }

    var geo = new THREE.BoxGeometry(ow, oh, od);
    var colorVal = normalizeColor(ocolor);
    if(ospecial === 'lava') colorVal = 0xff5500;
    if(ospecial === 'trampoline') colorVal = 0x9b59ff;
    if(!colorVal) colorVal = 0x888888;
    var mat = new THREE.MeshPhongMaterial({ 
        color: colorVal
    });
    var mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(ox, oy, oz);
    mesh.rotation.set(THREE.MathUtils.degToRad(orx) || 0, THREE.MathUtils.degToRad(ory) || 0, THREE.MathUtils.degToRad(orz) || 0);
    mesh.castShadow = true; mesh.receiveShadow = true; scene.add(mesh);

    var internalType = Math.abs(orx || 0) > 0.001 ? 'ramp' : 'box';
    var p = {
        mesh: mesh,
        halfX: ow/2, halfY: oh/2, halfZ: od/2,
        internalType: internalType,
        specialType: ospecial || null,
        planePoint: new THREE.Vector3(),
        planeNormal: new THREE.Vector3(),
        axisU: new THREE.Vector3(),
        axisV: new THREE.Vector3(),
        top: 0, bottom: 0,
        isGround: (oh < 0.6 && Math.abs(oy) < 0.5),
        obb: new OBB(new THREE.Vector3(ox, oy, oz), new THREE.Vector3(ow/2, oh/2, od/2)),
        move: null,
        prevPos: mesh.position.clone(),
        prevQuat: mesh.quaternion.clone(),
        playerStanding: false
    };

    if(p.specialType === 'lava'){
        lavaMaterials.push(mat);
        mat.emissive = mat.color.clone();
        mat.emissiveIntensity = 0.8;
    }

    // moving platform
    if(opts.moveType){
        var target = new THREE.Vector3(opts.targetX || opts.x2 || ox, opts.targetY || opts.y2 || oy, opts.targetZ || opts.z2 || oz);
        var startPos = new THREE.Vector3(ox, oy, oz);
        var startRot = new THREE.Euler(THREE.MathUtils.degToRad(orx||0), THREE.MathUtils.degToRad(ory||0), THREE.MathUtils.degToRad(orz||0));
        var targetRot = new THREE.Euler(THREE.MathUtils.degToRad(opts.targetRotX||opts.rotX2||0), THREE.MathUtils.degToRad(opts.targetRotY||opts.rotY2||0), THREE.MathUtils.degToRad(opts.targetRotZ||opts.rotZ2||0));
        var targetQuat = new THREE.Quaternion().setFromEuler(targetRot);
        var startQuat = new THREE.Quaternion().setFromEuler(startRot);
        p.move = {
            type: opts.moveType === 'moving_smooth' ? 'smooth' : 'normal',
            startPos: startPos.clone(),
            targetPos: target.clone(),
            startQuat: startQuat.clone(),
            targetQuat: targetQuat.clone(),
            speed: opts.speed || 2.0,
            duration: opts.duration || null,
            t: 0,
            dir: 1
        };
    }

    updateOBBFromMesh(p.obb, mesh);
    platforms.push(p);
    return mesh;
}

// To clear platforms 
function clearPlatforms(){
    for(var i=0;i<platforms.length;i++){
        scene.remove(platforms[i].mesh);
    }
    platforms = [];
    for(var j=0;j<decorations.length;j++){
        scene.remove(decorations[j].mesh);
    }
    decorations = [];
}

var currentLevel = 1;

// Goal 
var goal = {
    mesh: null,
    radius: 0.8,
    aabbHalf: new THREE.Vector3(0.8,0.8,0.8),
    position: new THREE.Vector3()
};
function createGoalAt(x,y,z){
    // Move or create the goal sphere so the player can touch it to win
    if(goal.mesh) scene.remove(goal.mesh);
    var geo = new THREE.SphereGeometry(goal.radius, 24, 24);
    var mat = new THREE.MeshPhongMaterial({color: 0xffff66, emissive: 0xffff00, shininess: 100});
    var mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    scene.add(mesh);
    goal.mesh = mesh;
    goal.position.set(x,y,z);
    goal.aabbHalf.set(goal.radius, goal.radius, goal.radius);
}

// Controls
var pointerLocked = false;
renderer.domElement.addEventListener('click', function(){ renderer.domElement.requestPointerLock(); });
document.addEventListener('pointerlockchange', function(){
    pointerLocked = (document.pointerLockElement === renderer.domElement);
    if(pointerLocked){
        removePauseScreenIfAny();
        endPause();
        updateUI();
    } else {
        if(!document.getElementById('win-screen') && !document.getElementById('level-select')){
            buildPauseScreen();
        }
    }
});

// Camera look vars for following the player and looking around
var alpha = Math.PI/2;   // yaw
var beta  = 0.6;         // pitch
var radius = 8;
var sensitivity = 0.0025;
var maxBeta = Math.PI/2 - 0.05;
document.addEventListener('mousemove', function(e){
    if(!pointerLocked) return;
    var dx = Math.max(-100, Math.min(100, e.movementX));
    var dy = Math.max(-100, Math.min(100, e.movementY));
    alpha -= dx * sensitivity;
    beta  += dy * sensitivity;
    if (beta < -maxBeta) beta = -maxBeta;
    if (beta >  maxBeta) beta =  maxBeta;
});

// keyboard 
var keys = [];
window.addEventListener('keydown', function(e){
    if(e.code === "Space") e.preventDefault();
    if(e.code === "KeyR"){
        player.position.set(0, 5, 0);
        velocityY = 0;
        levelStartTime = performance.now();
        return;
    }
    if(e.code === "Escape"){
        if(document.getElementById('win-screen') || document.getElementById('level-select')) return;
        togglePause();
        return;
    }
    keys[e.code] = true;
}, {
    passive:false
});
window.addEventListener('keyup', function(e){
    keys[e.code] = false;
});

// Player physics constants
var SPEED = 6;
var JUMP_SPEED = 12.5;
var GRAVITY = -30;
var TRAMPOLINE_BOOST = JUMP_SPEED * 1.6;

var velocityY = 0;
var grounded = false;
var clock = new THREE.Clock();

// ramp helpers
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
function updateRampInfo(ramp){
    var localTopCenter = new THREE.Vector3(0, ramp.halfY, 0);
    var worldTopCenter = localTopCenter.clone();
    ramp.mesh.localToWorld(worldTopCenter);
    ramp.planePoint.copy(worldTopCenter);
    var normalMatrix = new THREE.Matrix3().getNormalMatrix(ramp.mesh.matrixWorld);
    ramp.planeNormal.copy(new THREE.Vector3(0,1,0).applyMatrix3(normalMatrix).normalize());
    ramp.axisU.copy(new THREE.Vector3(1,0,0).applyMatrix3(normalMatrix).normalize());
    ramp.axisV.copy(new THREE.Vector3(0,0,1).applyMatrix3(normalMatrix).normalize());
    var localTop = new THREE.Vector3(0, ramp.halfY, 0), localBottom = new THREE.Vector3(0, -ramp.halfY, 0);
    var wTop = localTop.clone();
    ramp.mesh.localToWorld(wTop);
    var wBottom = localBottom.clone();
    ramp.mesh.localToWorld(wBottom);
    ramp.top = wTop.y;
    ramp.bottom = wBottom.y;
}

// Level & save state 
var STORAGE_KEY = 'pf_platformer_v1';
var saveData = {
    unlocked: [],
    bestTimes: []
};
var pauseStartTime = null;
function beginPause(){
    if(pauseStartTime === null) pauseStartTime = performance.now(); 
    gamePaused = true;
}
function endPause(){
    if(pauseStartTime !== null){ 
        levelStartTime += performance.now() - pauseStartTime; pauseStartTime = null;
        }
    gamePaused = false;
}
function loadSave(){
    // Load save data from localStorage
    try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if(raw){ 
            var parsed = JSON.parse(raw);
            saveData.unlocked = parsed.unlocked || []; saveData.bestTimes = parsed.bestTimes || []; 
        } 
        
    } catch(e){ 
        console.warn(e); 
    }
    for(var i=0;i<levels.length;i++){
        if(saveData.unlocked[i] === undefined) saveData.unlocked[i] = (i===1);
        if(saveData.bestTimes[i] === undefined) saveData.bestTimes[i] = null; 
        
    }
  
    // Load graphics mode preference from localStorage
    try { 
        var savedMode = localStorage.getItem('pf_graphicsMode');
        if(savedMode){ 
            graphicsMode = savedMode; 
            
        }
        
    } catch(e){ 
        console.warn(e);
    }
  
    save();
}
function save(){
    // Try to save to localStorage
    try { 
        localStorage.setItem(STORAGE_KEY, JSON.stringify(saveData)); 
        
    } catch(e){ 
        // Argggg another one of these
        console.warn(e); 
    } 
    
}

var levelStartTime = 0;
var gamePaused = false;
var uiOverlay = document.getElementById('ui-overlay');
var minGoalEnableMs = 250;
var lavaGraceMs = 300; // no spawnkilling

function loadLevel(index){
    // Clear current level and spawn its platforms, decorations and the goal.
    currentLevel = index;
    clearPlatforms();
    var lvl = levels[index];
    lvl.items.forEach(function (it) {
        // Support two item forms: array or object
        if (Array.isArray(it)) {
            try {
                 // array: [x,y,z,w,h,d,rotX,rotY,rotZ,color,specialType]
                var a = it;
                var obj = {
                    x: a[0] || 0, y: a[1] || 0, z: a[2] || 0,
                    w: a[3] || 1, h: a[4] || 1, d: a[5] || 1,
                    rotX: a[6] || 0, rotY: a[7] || 0, rotZ: a[8] || 0,
                    color: a[9] || null,
                    specialType: a[10] || null
                };
                createBlock(obj);
            } catch (e) {
                console.warn('level item array error', e);
            }
        } else if (it && typeof it === 'object') {
            try {
                createBlock(it);
            } catch (e) {
                console.warn('level item object error', e);
            }
        }
    });
    var gx = lvl.goal.x;
    var gz = lvl.goal.z;
    var targetPlatform = null;
    for(var i=0;i<platforms.length;i++){
        var p = platforms[i];
        var dx = Math.abs(p.mesh.position.x - gx);
        var dz = Math.abs(p.mesh.position.z - gz);
        if(dx <= p.halfX + 0.5 && dz <= p.halfZ + 0.5){
            targetPlatform = p; break;
        }
    }
    var gy;
    if(targetPlatform){
        gy = targetPlatform.mesh.position.y + targetPlatform.halfY + (levels[index].goal.yOffset || 1.0);
    }
    else { 
        gy = (levels[index].goal.yOffset || 2.5);
    }
    createGoalAt(gx, gy, gz);
    player.position.set(0, 5, 0);
    velocityY = 0;
    grounded = false;
    levelStartTime = performance.now();
    pauseStartTime = null;
    gamePaused = false;
    removeWinScreenIfAny();
    removePauseScreenIfAny();
    removeLevelSelectIfAny();
    updateUI(); save();
    if(document.pointerLockElement !== renderer.domElement) { 
        buildPauseScreen();
    }
}

// UI/menus  
function showWinScreen(elapsedSeconds){
    // win screen
    beginPause();
    try { 
        if(document.exitPointerLock) document.exitPointerLock();
    } catch(e){}
    removeWinScreenIfAny();
    var el = document.createElement('div');
    el.id='win-screen';
    el.className='win-screen';
    var text = document.createElement('div');
    text.innerHTML = '<div>Mission Passed<div class="small">Level time: ' + elapsedSeconds.toFixed(2) + 's</div></div>'; 
    el.appendChild(text);
    var prev = saveData.bestTimes[currentLevel]; 
    var improved = false;
    if(prev === null || elapsedSeconds < prev){
        saveData.bestTimes[currentLevel] = elapsedSeconds;
        improved = true; 
    }
    if(currentLevel + 1 < levels.length){ 
        saveData.unlocked[currentLevel + 1] = true;
    }
    save();
    var total = 0;
    for(var i=0;i<saveData.bestTimes.length;i++){ 
        if(saveData.bestTimes[i] !== null) total += saveData.bestTimes[i]; 
    }
    var small = document.createElement('div');
    small.className='small';
    small.textContent = 'Total (all fastest saves): ' + (total > 0 ? total.toFixed(2) + 's' : '—');
    el.appendChild(small);
    var row = document.createElement('div'); row.className='row';
    var btnNext = document.createElement('button');
    btnNext.textContent = (currentLevel < levels.length - 1) ? 'Next Level' : 'Restart';
  
    if(currentLevel < levels.length - 1 && !saveData.unlocked[currentLevel + 1]){
        btnNext.disabled = true; 
        btnNext.classList.add('locked');
    }
    
    btnNext.addEventListener('click', function(){
        endPause();
        if(currentLevel < levels.length - 1){
            loadLevel(currentLevel + 1);
            try {
                renderer.domElement.requestPointerLock(); 
            } catch(e){} 
        }
        else { 
            loadLevel(1);
            try { 
                renderer.domElement.requestPointerLock();
            } catch(e){}
        }
        removeWinScreenIfAny();
    });
    var btnMenu = document.createElement('button');
    btnMenu.textContent='Level Select';
    btnMenu.style.marginLeft='0.6em';
    btnMenu.addEventListener('click', function(){
        buildLevelSelect();
    });
    row.appendChild(btnNext);
    row.appendChild(btnMenu); 
    el.appendChild(row);
    
    if(improved){ 
        var imp = document.createElement('div');
        imp.className='small';
        imp.style.marginTop='0.6em'; 
        imp.textContent = 'New best time for level ' + currentLevel + '!'; el.appendChild(imp); 
    }
    document.body.appendChild(el);
}

function removeWinScreenIfAny(){
    var ex = document.getElementById('win-screen');
    if(ex) ex.remove();
}
function buildLevelSelect(){
    // Build level select UI with unlocked buttons and best times
    beginPause(); 
    removeWinScreenIfAny();
    removePauseScreenIfAny();
    removeLevelSelectIfAny();
    var wrap = document.createElement('div');
    wrap.id='level-select';
    wrap.className='level-select';
    var title = document.createElement('div');
    title.textContent='Level select';
    title.style.fontSize='4vw'; 
    title.style.marginTop='0.5em';
    wrap.appendChild(title);
    var container = document.createElement('div');
    container.className='level-grid';
    for(var i=1;i<levels.length;i++){ (
        function(i){ 
            var b = document.createElement('button'); 
            b.className='level-button';
            var numDiv = document.createElement('div'); 
            numDiv.className='level-button-number'; 
            numDiv.textContent = i;
            b.appendChild(numDiv);
            var timeDiv = document.createElement('div'); 
            timeDiv.className='level-button-time';
            timeDiv.textContent = saveData.bestTimes[i] ? saveData.bestTimes[i].toFixed(2) + 's' : '—';
            b.appendChild(timeDiv);
            if(!saveData.unlocked[i]){ 
                b.classList.add('locked'); 
                b.disabled = true; 
            } else { 
                b.addEventListener('click', function(){ 
                loadLevel(i); 
                removeLevelSelectIfAny(); 
                buildPauseScreen();
            }); 
        }
        container.appendChild(b); 
        })(i);
    }
    wrap.appendChild(container); 
    var back = document.createElement('button'); 
    back.textContent='Back'; 
    back.className='level-select-back';
    back.addEventListener('click', function(){ 
        removeLevelSelectIfAny(); 
        buildPauseScreen();
    });
    wrap.appendChild(back); 
    document.body.appendChild(wrap);
}
function removeLevelSelectIfAny(){ 
    var ex = document.getElementById('level-select');
    if(ex) ex.remove();
}
function buildPauseScreen(){ 
    // Pause menu
    if(document.getElementById('pause-screen')) return; 
    beginPause(); 
    removeWinScreenIfAny();
    removePauseScreenIfAny();
    keys = [];
    var el = document.createElement('div');
    el.id='pause-screen'; 
    el.className='pause-screen';
    var title = document.createElement('div');
    title.textContent='Paused';
    title.style.fontSize='3vw';
    el.appendChild(title);
    var btnUnpause = document.createElement('button');
    btnUnpause.textContent='Resume';
    btnUnpause.addEventListener('click', function(){ 
        endPause(); 
        removePauseScreenIfAny(); 
        updateUI(); 
        try {
            renderer.domElement.requestPointerLock();
        } catch(e){} 
    });
    var btnSelect = document.createElement('button'); 
    btnSelect.textContent='Level Select'; 
    btnSelect.style.marginLeft='0.6em'; 
    btnSelect.addEventListener('click', function(){ 
        buildLevelSelect(); 
    });
    var row = document.createElement('div'); 
    row.className='row'; 
    row.appendChild(btnUnpause); 
    row.appendChild(btnSelect); 
    el.appendChild(row);

    // Graphics toggle for ppl with slow computres
    var gfxRow = document.createElement('div');
    gfxRow.className = 'row';
    var gfxLabel = document.createElement('label');
    gfxLabel.style.fontSize = '1.4vw';
    gfxLabel.style.display = 'flex';
    gfxLabel.style.alignItems = 'center';
    gfxLabel.style.gap = '0.6em';
    var gfxCheckbox = document.createElement('input');
    gfxCheckbox.type = 'checkbox';
    gfxCheckbox.checked = (graphicsMode === 'fancy');
    var gfxText = document.createElement('span'); 
    gfxText.textContent = (graphicsMode === 'fancy' ? 'Graphics: Fancy' : 'Graphics: Fast');
    gfxText.style.pointerEvents = 'none';
    gfxLabel.appendChild(gfxCheckbox); 
    gfxLabel.appendChild(gfxText);
    gfxCheckbox.addEventListener('change', function(){
        if(gfxCheckbox.checked){
            gfxText.textContent = 'Graphics: Fancy'; 
            applyGraphicsMode('fancy');
        }
        else {
            gfxText.textContent = 'Graphics: Fast';
            applyGraphicsMode('fast'); 
        }
    });
    gfxRow.appendChild(gfxLabel);
    el.appendChild(gfxRow);
    document.body.appendChild(el);
}

function removePauseScreenIfAny(){ 
    var ex = document.getElementById('pause-screen'); 
    if(ex) ex.remove(); 
}

function togglePause(){ 
    if(document.getElementById('win-screen') || document.getElementById('level-select')) return;
    if(document.getElementById('pause-screen')){
        removePauseScreenIfAny();
        endPause(); 
        updateUI();
        try {
            renderer.domElement.requestPointerLock();
        } catch(e){} 
    } else {
        buildPauseScreen(); 
        keys = []; 
    } 
}

function updateUI(){ 
    // Update HUD with level, elapsed time and best time.
    var best = saveData.bestTimes[currentLevel]; 
    var elapsed = ((performance.now() - levelStartTime)/1000); uiOverlay.innerHTML = 'Level: ' + currentLevel + ' &nbsp; | &nbsp; Time: ' + (elapsed.toFixed(2)) + 's' + (best ? (' &nbsp; | &nbsp; Best: ' + best.toFixed(2) + 's') : '');
}
// for rotations (simmilar to the one from path of light)
function lerpAngle(a, b, t){
    var diff = (((b - a + Math.PI) % (2*Math.PI)) + (2*Math.PI)) % (2*Math.PI) - Math.PI;
    return a + diff * t;
}
// Main loop
function animate(){
    // update like everything...
    var delta = clock.getDelta();
    if(delta > 0.1) delta = 0.1;
    
    var GRAVITY = 30;
    var LANDING_EPS = 0.05;

    if(!gamePaused){
        for(var pi=0; pi<platforms.length; pi++){
            var p = platforms[pi];
            // store previous transforms
            p.prevPos.copy(p.mesh.position);
            p.prevQuat.copy(p.mesh.quaternion);
            
            if(p.move){
                if(p.move.type === 'normal'){
                    // normal platforms
                    var curTarget = (p.move.dir === 1) ? p.move.targetPos : p.move.startPos;
                    var toTarget = new THREE.Vector3().subVectors(curTarget, p.mesh.position);
                    var dist = toTarget.length();
                    if(dist > 1e-5){
                        var step = p.move.speed * delta;
                        var moveVec = toTarget.normalize().multiplyScalar(Math.min(step, dist));
                        p.mesh.position.add(moveVec);
                    } else {
                        p.move.dir *= -1;
                    }
                    // rotate a bit toward targetQuat for visual rotation
                    try{
                        p.mesh.quaternion.slerp((p.move.dir===1? p.move.targetQuat : p.move.startQuat), Math.min(1, p.move.speed * delta * 0.3));
                    } catch(e){}
                } else if(p.move.type === 'smooth'){
                    // ease in/out
                    var totalDist = p.move.startPos.distanceTo(p.move.targetPos);
                    var dur = p.move.duration || Math.max(0.0001, totalDist / Math.max(0.0001, p.move.speed));
                    p.move.t += (delta / dur) * p.move.dir;
                    if(p.move.t >= 1){ 
                        p.move.t = 1;
                        p.move.dir = -1;
                    }
                    if(p.move.t <= 0){
                        p.move.t = 0; 
                        p.move.dir = 1; 
                    }
                    var ease = 0.5 - 0.5 * Math.cos(Math.PI * p.move.t); // cosine ease in/ out
                    p.mesh.position.lerpVectors(p.move.startPos, p.move.targetPos, ease);
                    // rotate smoothly yay
                    var q = new THREE.Quaternion();
                    q.copy(p.move.startQuat).slerp(p.move.targetQuat, ease);
                    p.mesh.quaternion.copy(q);
                }
            }
        }

        // If player was standing on a platform last frame, move player with platform transform
        for(var pi=0; pi<platforms.length; pi++){
            var p = platforms[pi];
            if(!p.playerStanding) continue;
            // only move if player is near the top surface
            var topY = p.mesh.position.y + p.halfY;
            var dx = Math.abs(player.position.x - p.mesh.position.x);
            var dz = Math.abs(player.position.z - p.mesh.position.z);
            if(dx > p.halfX + 1.2 || dz > p.halfZ + 1.2) continue;
            if(Math.abs(player.position.y - topY) > 2.5) continue;

            // Compute platform transform....
            var prevCenter = p.prevPos.clone();
            var prevQuat = p.prevQuat.clone();
            var newCenter = p.mesh.position.clone();
            var newQuat = p.mesh.quaternion.clone();
            
            var vPrev = player.position.clone().sub(prevCenter);
            var deltaQuat = newQuat.clone().multiply(prevQuat.clone().invert());
            var vAfter = vPrev.clone().applyQuaternion(deltaQuat);
            var newPlayerWorld = newCenter.clone().add(vAfter);
            var desiredDelta = newPlayerWorld.clone().sub(player.position);
            player.position.add(desiredDelta);
        }
        
        // Pulse lava color
        if(lavaMaterials.length){
            var pulse = 0.5 + 0.5 * Math.sin(performance.now() * 0.009);
            for(var li=0; li<lavaMaterials.length; li++){
                var m = lavaMaterials[li];
                m.color.copy(lavaBaseColor).lerp(lavaTargetColor, pulse);
                if(m.emissive) m.emissive.copy(m.color);
                m.emissiveIntensity = 0.6 + 0.6 * pulse;
            }
        }
    
        var moveX = 0, moveZ = 0;
        if(keys["KeyW"]) moveZ -= 1;
        if(keys["KeyS"]) moveZ += 1;
        if(keys["KeyA"]) moveX -= 1;
        if(keys["KeyD"]) moveX += 1;
        
        var forward = new THREE.Vector3(Math.sin(alpha), 0, Math.cos(alpha));
        var rightVec = new THREE.Vector3(Math.sin(alpha + Math.PI/2), 0, Math.cos(alpha + Math.PI/2));
        var moveDir = new THREE.Vector3();
        if(moveZ !== 0) moveDir.addScaledVector(forward, moveZ);
        if(moveX !== 0) moveDir.addScaledVector(rightVec, moveX);
        if(moveDir.lengthSq() > 0) moveDir.normalize();
        
        var desiredVx = 0, desiredVz = 0;
        if(moveDir.lengthSq() > 0){
            desiredVx = moveDir.x * SPEED;
            desiredVz = moveDir.z * SPEED;
        }

        // Apply gravity & movement 
        velocityY -= GRAVITY * delta;
        player.position.x += desiredVx * delta;
        player.position.y += velocityY * delta;
        player.position.z += desiredVz * delta;
    
        // Clamp velocity to prevent huge movements (it makes the camera tweek out)
        if(velocityY < -100) velocityY = -100;
    
        // Build player's OBB for collision checks
        var playerMin = new THREE.Vector3(player.position.x - playerHalf, player.position.y - playerHalf, player.position.z - playerHalf);
        var playerMax = new THREE.Vector3(player.position.x + playerHalf, player.position.y + playerHalf, player.position.z + playerHalf);
    
        // Check collisions
        grounded = false;
        var trampolineHit = false;
        var landedPlatform = null; // which platform we landed on this frame
        
        // 3 iterations
        for(var iter = 0; iter < 3; iter++){
            for(var i = 0; i < platforms.length; i++){
                var platform = platforms[i];
                updateOBBFromMesh(platform.obb, platform.mesh);
                
                // Create player OBB (rotated to match player)
                var playerOBB = new OBB(player.position.clone(), new THREE.Vector3(playerHalf, playerHalf, playerHalf), [new THREE.Vector3(), new THREE.Vector3(), new THREE.Vector3()]);
                // copy its axes into the OBB
                player.updateMatrixWorld();
                updateOBBFromMesh(playerOBB, player);
            
                var penetration = getOBBPenetration(playerOBB, platform.obb);
            
                // Overlap detected!
                if(penetration){
                    
                    // Lava, so respawn player at start instantly.
                    if(platform.specialType === 'lava'){
                        player.position.set(0, 5, 0);
                        velocityY = 0;
                        levelStartTime = performance.now();
                        continue;
                    }
                    
                // Push player out along penetration axis to fix overlap.
                var pushDir = penetration.axis.clone().normalize();
                var pushAmount = penetration.depth + 0.005;
              
                // Determine collision type from axis direction
                var yDot = Math.abs(pushDir.y);
              
                // Only affect velocity on strong vertical collisions
                if(yDot > 0.7){
                    // Strong vertical collision
                    player.position.addScaledVector(pushDir, pushAmount);
                
                    if(velocityY < -0.05 && pushDir.y > 0){
                        // Landing on top (push direction points up)
                        velocityY = 0;
                        grounded = true;
                        landedPlatform = platform;
                        if(platform.specialType === 'trampoline') trampolineHit = true;
                        } else if(velocityY > 0.05 && pushDir.y < 0){
                            // Hit ceiling (push direction points down)
                            velocityY = 0;
                        }
                    } else {
                        // Weak vertical component so push only horizontally 
                        var horizPush = new THREE.Vector3(pushDir.x, 0, pushDir.z).normalize();
                        if(horizPush.lengthSq() > 0.0001){
                            player.position.addScaledVector(horizPush, pushAmount);
                        } else {
                            player.position.addScaledVector(pushDir, pushAmount);
                        }
                    }
                }
            }
        }
    
        // mark which platform the player is standing on
        for(var pi=0; pi<platforms.length; pi++) platforms[pi].playerStanding = (platforms[pi] === landedPlatform);
        
        if(trampolineHit){
            velocityY = TRAMPOLINE_BOOST;
            // prevent sticking to trampoline: don't treat it as standing platform
            if(landedPlatform){
                landedPlatform.playerStanding = false;
            }
            grounded = false;
        }
        
        // Jump only if not just boosted by trampoline
        if(keys["Space"] && grounded && !trampolineHit){
            velocityY = JUMP_SPEED;
        }
        
        // Respawn if fallen too deep
        if(player.position.y < -30){
            player.position.set(0, 5, 0);
            velocityY = 0;
            grounded = false;
            levelStartTime = performance.now();
        }
        
        // Rotate player smoothly toward movement dir like in path of light yay
        if(moveDir.lengthSq() > 0.000001){
            var targetAngle = Math.atan2(moveDir.x, moveDir.z); 
            var t = 1 - Math.pow(1 - 0.12, Math.max(0, delta * 60));
            player.rotation.y = lerpAngle(player.rotation.y, targetAngle, t);
        }
    }
    // Camera
    var target = player.position.clone();
    var camX = target.x + radius * Math.cos(beta) * Math.sin(alpha);
    var camY = target.y + radius * Math.sin(beta);
    var camZ = target.z + radius * Math.cos(beta) * Math.cos(alpha);
    camera.position.set(camX, camY, camZ);
    camera.lookAt(target);
    renderer.render(scene, camera);
    
    if(!gamePaused) updateUI();
    
    // Goal test
    if(goal.mesh && !gamePaused){
        if(performance.now() - levelStartTime > minGoalEnableMs){
            var dx = player.position.x - goal.position.x;
            var dy = player.position.y - goal.position.y;
            var dz = player.position.z - goal.position.z;
            var distSq = dx*dx + dy*dy + dz*dz;
            var threshold = (goal.radius + playerHalf);
            if(distSq <= threshold*threshold){
                var elapsed = (performance.now() - levelStartTime) / 1000.0;
                showWinScreen(elapsed);
            }
        }
    }
    
    requestAnimationFrame(animate);
}

// start 
loadSave();
applyGraphicsMode(graphicsMode); // Apply saved graphics mode
animate();
loadLevel(currentLevel);

// Resize 
window.addEventListener('resize', function(){
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
