<!DOCTYPE html><html lang="en"><script>/**

I am getting a raspberry pi 5, and i want to make it into a little arcade machine! I plan to run Super Mario 64, this, and generic platformer!
Raspberry pi's aren't very powerful, so I needed to optimize this game a lot for the limited hardware.
Idk how ima get mario 64 on it, but it can't be harder than this lol
generic platformer was made using three.js which is pretty fast on its own, so it should be fine with some optimizations. I also have a few tricks up my sleeve to make it run better, but we'll see how it goes!

This was one of my slowest games on Khan Academy, and it was a nightmare to optimize. I had to rewrite the entire rendering system to get it to run at a decent framerate. It paid off though! 4x faster than original. Here are some of the optimizations I made:
 * DK Converter reduces draw calls, and load the graphics as images.
 * culling to further reduce draw calls (only for barrels because map is baked)
 * Biggest by far:
 *  - bake the map. It is one giant image, just one draw call. This delivered 2.5x more speed.
 * Various logic improvments, all increasing speed.

Credit to copilot for help on optimizations
@MushyAvocado for KA Project Exporter (https://www.khanacademy.org/computer-programming/ka-project-exporter/5195486791385088)

Original game:
https://www.khanacademy.org/computer-programming/donkey-khan-pk/5669361168269312

~Digits <3
done in a script to make it blue (again)
*/

			// is it an array?

			// is it a PImage or similar object?
			function isPImage(obj) {
			    if (!obj) { return false; }
			    try {
			        return (typeof obj.width === "number") || (typeof obj.get === "function");
			    } catch (e) {
			        return false;
			    }
			}
			
			// is it an RLE frame (array of strings)?
			function isRLEFrame(frame) {
			    return isArray(frame) && frame.length > 0 && typeof frame[0] === "string";
			}
			
			// build a cache key for pixel art rendering
			function buildCacheKey(data, frameIndex, pixelSize, colorMap) {
			    var prefix = "";
			    try {
			        prefix = JSON.stringify(data);
			    } catch (e) {
			        prefix = String(data);
			    }
			
			    var cmap = "";
			    try {
			        cmap = JSON.stringify(colorMap);
			    } catch (e2) {
			        cmap = String(colorMap);
			    }
			
			    return prefix + "|" + String(frameIndex) + "|" + String(pixelSize) + "|" + cmap;
			}
			
			// Clear the entire pixel art cache
			function clearPixelArtCache() {
			    _pixelArtCache = {};
			}
			
			// Invalidate a specific pixel art cache entry
			function invalidatePixelArtCacheFor(data, frameIndex, pixelSize, colorMap) {
			    var key = buildCacheKey(data, frameIndex, pixelSize, colorMap);
			    if (_pixelArtCache[key]) {
			        delete _pixelArtCache[key];
			    }
			}
			
			// Decode a single RLE row string into an array of characters
			function decodeRLERow(row) {
			    var out = [];
			    if (!row) { return out; }
			    var i = 0;
			    var n = row.length;
			
			    while (i < n) {
			        var ch = row.charAt(i);
			
			        // skip digits (should not happen at this point)
			        if (ch >= '0' && ch <= '9') {
			            i++;
			            continue;
			        }
			
			        // advance past the char
			        i++;
			        // collect digits (if any) to form the count
			        var numStr = "";
			        while (i < n) {
			            var d = row.charAt(i);
			            if (d < '0' || d > '9') { break; }
			            numStr += d;
			            i++;
			        }
			
			        var count = numStr.length ? parseInt(numStr, 10) : 1;
			
			        for (var k = 0; k < count; k++) {
			            out.push(ch);
			        }
			    }
			
			    return out;
			}
			
			// Decode an RLE image (array of RLE row strings) into a 2D array of characters
			function decodeRLEImage(lines) {
			    var pixels = [];
			    for (var y = 0; y < lines.length; y++) {
			        pixels[y] = decodeRLERow(lines[y] || "");
			    }
			    return pixels;
			}
			
			// Check if a frame has any visible color based on the color map
			function frameHasVisibleColor(frameData, colorMap) {
			    if (!frameData) { return false; }
			    for (var i = 0; i < frameData.length; i++) {
			        var row = frameData[i];
			        if (!row) { continue; }
			        // check each character in the row
			        for (var k = 0; k < row.length; k++) {
			            var ch = row[k];
			            if (ch !== "-" && colorMap && colorMap[ch] !== undefined) {
			                return true;
			            }
			        }
			    }
			    return false;
			}
			
			// Draw decoded pixel data to a graphics buffer
			function drawDecodedToGraphics(g, px, pixelSize, palette) {
			    // Attempt to disable smoothing to keep crisp edges
			    try {
			        // idk if this actually works in KA
			        if (typeof g.noSmooth === "function") { g.noSmooth(); }
			    } catch (e) { }
			
			    // ensure corner alignment
			    try {
			        if (typeof g.rectMode === "function") { g.rectMode(CORNER); }
			    } catch (e2) { }
			
			    g.noStroke();
			
			    for (var y = 0; y < px.length; y++) {
			        var row = px[y] || [];
			        var x = 0;
			        while (x < row.length) {
			            var ch = row[x];
			            var start = x;
			            x++;
			            while (x < row.length && row[x] === ch) { x++; }
			            var run = x - start;
			
			            if (ch === "-" || ch === null || ch === undefined) {
			                // transparent pixel, skip
			                continue;
			            }
			
			            var col = palette && palette[ch];
			            if (!col) {
			                // unmapped symbol, skip
			                continue;
			            }
			
			            // compute rectangle coordinates
			            var x1 = round(start * pixelSize);
			            var x2 = round((start + run) * pixelSize);
			            var y1 = round(y * pixelSize);
			            var y2 = round((y + 1) * pixelSize);
			
			            var gw = x2 - x1;
			            var gh = y2 - y1;
			
			            if (gw <= 0 || gh <= 0) { continue; }
			
			            if (isArray(col)) {
			                if (col.length === 4) {
			                    g.fill(col[0], col[1], col[2], col[3]);
			                } else {
			                    g.fill(col[0], col[1], col[2]);
			                }
			            } else {
			                g.fill(col);
			            }
			
			            g.rect(x1, y1, gw, gh);
			        }
			    }
			}
			
			// Main renderer
			function drawHugePixelArt(startX, startY, pixelSize, canvasData, colorMap, frame) {
			    // tiny safety margin for buffer sizing, but not used for drawing
			    var sizeMargin = 1; 
			    noStroke();
			
			    // IMAGE PATHS first
			    if (isArray(canvasData) && canvasData.length > 0 && isPImage(canvasData[0])) {
			        if (frame === undefined) { frame = 1; }
			        frame = Math.floor(frame);
			        var idx = ((frame - 1) % canvasData.length + canvasData.length) % canvasData.length;
			        var img = canvasData[idx];
			        if (!img) { return; }
			
			        var w = (typeof img.width === "number") ? img.width : (img.getWidth ? img.getWidth() : 0);
			        var h = (typeof img.height === "number") ? img.height : (img.getHeight ? img.getHeight() : 0);
			
			        image(img, startX, startY, round(w * pixelSize), round(h * pixelSize));
			        return;
			    }
			
			    if (isPImage(canvasData)) {
			        var w2 = (typeof canvasData.width === "number") ? canvasData.width : (canvasData.getWidth ? canvasData.getWidth() : 0);
			        var h2 = (typeof canvasData.height === "number") ? canvasData.height : (canvasData.getHeight ? canvasData.getHeight() : 0);
			
			        image(canvasData, startX, startY, round(w2 * pixelSize), round(h2 * pixelSize));
			        return;
			    }
			
			    // RLE PATH
			    var isFrames = isArray(canvasData) && canvasData.length > 0 && isRLEFrame(canvasData[0]);
			
			    var data;
			    var frameIndex = 0;
			
			    if (isFrames) {
			        if (frame === undefined) { frame = 1; }
			        frame = Math.floor(frame);
			
			        var idx2 = ((frame - 1) % canvasData.length + canvasData.length) % canvasData.length;
			
			        var attempts = 0;
			        var chosenIndex = idx2;
			        while (attempts < canvasData.length) {
			            var candidate = canvasData[chosenIndex];
			            if (frameHasVisibleColor(candidate, colorMap)) {
			                break;
			            }
			            chosenIndex = (chosenIndex - 1 + canvasData.length) % canvasData.length;
			            attempts++;
			        }
			
			        data = canvasData[chosenIndex];
			        frameIndex = chosenIndex;
			    } else {
			        if (!isArray(canvasData) || !isRLEFrame(canvasData)) {
			            return;
			        }
			        data = canvasData;
			        frameIndex = 0;
			    }
			
			    if (!data || data.length === 0) { return; }
			
			    var cacheKey = buildCacheKey(data, frameIndex, pixelSize, colorMap);
			
			    if (!_pixelArtCache[cacheKey]) {
			        // decode fully (2D char array)
			        var decoded = decodeRLEImage(data);
			
			        // compute max cols and rows
			        var maxCols = 0;
			        for (var r = 0; r < decoded.length; r++) {
			            var ln = decoded[r] ? decoded[r].length : 0;
			            if (ln > maxCols) { maxCols = ln; }
			        }
			        var rows = decoded.length;
			
			        var gw = max(1, round(maxCols * pixelSize) + sizeMargin);
			        var gh = max(1, round(rows * pixelSize) + sizeMargin);
			
			        var g = createGraphics(gw, gh, P2D);
			        g.background(0, 0, 0, 0);
			
			        // ensure corner alignment and crisp edges
			        try {
			            if (typeof g.rectMode === "function") { g.rectMode(CORNER); }
			            if (typeof g.noSmooth === "function") { g.noSmooth(); }
			        } catch (e3) { }
			        
			        g.noStroke();
			        
			        // draw to graphics buffer
			        drawDecodedToGraphics(g, decoded, pixelSize, colorMap);
			
			        _pixelArtCache[cacheKey] = g;
			    }
			    // let's light this candle
			    image(_pixelArtCache[cacheKey], startX, startY);
			}

			// get width/height (in pixels, not scaled) from a frame
			function getFrameDims(frame) {
			    var maxCols = 0;
			    for (var i = 0; i < frame.length; i++) {
			        var ln = (frame[i] ? frame[i].length : 0);
			        if (ln > maxCols) { maxCols = ln; }
			    }
			    return { cols: maxCols, rows: frame.length };
			}
			
			// choose the "current" frame for culling checks
			function getFrameForCulling(canvasData, frame) {
			    // animated frames: [ [rowStrings], [rowStrings], ... ]
			    if (isArray(canvasData) && canvasData.length > 0 && isRLEFrame(canvasData[0])) {
			        var f = (frame === undefined ? 1 : frame);
			        f = Math.floor(f);
			        var idx = ((f - 1) % canvasData.length + canvasData.length) % canvasData.length;
			        return canvasData[idx];
			    }
			    // single frame: [rowStrings]
			    return canvasData;
			}
			
			// simple world to screen visibility test (accounts for camera translate)
			function isVisibleWorld(x, y, w, h, margin) {
			    margin = (margin === undefined) ? 80 : margin;
			    var sy = y + cameraY;
			    return (
			        x + w >= -margin &&
			        x <= 600 + margin &&
			        sy + h >= -margin &&
			        sy <= 600 + margin
			    );
			}
			
			// culled draw wrapper (reduces draw calls a lot)
			function drawHugePixelArtCulled(x, y, pixelSize, canvasData, colorMap, frame, margin) {
			    var fr = getFrameForCulling(canvasData, frame);
			    if (!fr) { return; }
			    var d = getFrameDims(fr);
			    var w = d.cols * pixelSize;
			    var h = d.rows * pixelSize;
			    if (!isVisibleWorld(x, y, w, h, margin)) { return; }
			    drawHugePixelArt(x, y, pixelSize, canvasData, colorMap, frame);

			// rotate a pixel art array 90° clockwise

			    var rotated = [];
			    var rows = canvasData.length;

			        for (var row = rows - 1; row >= 0; row--) {

			        }
			        rotated.push(newRow);

			// handles the barrels
			function handleBarrels() {
			    for (var i = 0; i < barrels.length; i++) {
			        var b = barrels[i];
			        
			        // Safety: remove broken barrels
			        if (!b || isNaN(b.x) || isNaN(b.y)) {
			            removeAtSwapPop(barrels, i);
			            i--;
			            continue;
			        }
			        
			        // Apply gravity + movement
			        b.velocityY += barrelGravity;
			        b.y += b.velocityY;
			        b.x += b.velocityX;
			        
			        // Kill barrels that are far below the player (gone)
			        // (do this early to avoid extra work + draw calls)
			        if (b.y > playerY + 650) {
			removeAtSwapPop(barrels, i);
			i--;
			continue;
			        }
			        
			        // Bounce off walls
			        if (b.x <= 0 || b.x >= 600 - 11 * b.pixelSize) {
			            b.velocityX *= -1;
			        }
			        
			        // Stair-step logic
			        var barrelBottom = b.y + 11 * b.pixelSize;
			        var bestGround = null;
			        
			        for (var j = 0; j < trusses.length; j++) {
			            var t = trusses[j];
			            var trussWidth = t.length * 13 * t.pixelSize;
			            var trussTop = t.y;
			
			            var overlapX = (b.x + 11*b.pixelSize > t.x) && (b.x < t.x + trussWidth);
			            if (!overlapX) { continue; }
			
			            var diff = trussTop - barrelBottom;
			            if (diff < -stepHeight || diff > stepHeight) { continue; }
			
			            var stepHeight = 11 * b.pixelSize / 2;
			
			            if (diff >= -stepHeight && diff <= stepHeight) {
			                if (bestGround === null || trussTop < bestGround) {
			                    bestGround = trussTop;
			                }
			            }
			        }
			        
			        if (bestGround !== null) {
			            b.y = bestGround - 11 * b.pixelSize;
			            b.velocityY = 0;
			        }
			        
			        // Rotation animation
			        if (frameCount % barrelAnimationDelay === 0) {
			            b.rotation = (b.rotation + 1) % 4;
			        }
			        
			        // Draw barrel (internally culled now via drawBarrel->drawHugePixelArtCulled)
			        drawBarrel(b.x, b.y, b.pixelSize, b.rotation, b.laserProof);
			        
			        // Player collision
			        var barrelRadius = 5.5 * b.pixelSize;
			        var barrelCenterX = b.x + barrelRadius;
			        var barrelCenterY = b.y + barrelRadius;
			        
			        var playerCenterX = playerX + playerWidth / 2;
			        var playerCenterY = playerY + playerHeight / 2;
			        
			        var dx = barrelCenterX - playerCenterX;
			        var dy = barrelCenterY - playerCenterY;
			        var combinedRadius = barrelRadius + Math.min(playerWidth, playerHeight)/3;
			        var rr = combinedRadius * combinedRadius;
			        
			        if (dx*dx + dy*dy < rr && gameState === "playing") {
			            triggerGameOver();
			        }
			    }
			}

			}
			
			
			function drawPixelArc(cx, cy, diameter, pixelSize, progress, activeColor, bgColor) {
			    var radius = diameter / 2;
			    var center = radius;
			    var outlineOuterRadiusSq = (radius + 0.1) * (radius + 0.1);
			    var fillRadiusSq = (radius - 1) * (radius - 1);
			    
			    var startX = cx - (diameter * pixelSize / 2);
			    var startY = cy - (diameter * pixelSize / 2);
			    
			    noStroke();
			    for (var y = 0; y < diameter; y++) {
			        for (var x = 0; x < diameter; x++) {
			            var dx = x + 0.5 - center;
			            var dy = y + 0.5 - center;
			            var distSq = dx * dx + dy * dy;
			            
			            // only the outline ring pixels
			            if (distSq > fillRadiusSq && distSq <= outlineOuterRadiusSq) {
			                // angle starting from top (12 o'clock), going clockwise
			                var angle = Math.atan2(dy, dx) + Math.PI / 2;
			                if (angle < 0) { angle += Math.PI * 2; }
			
			                var lit = (angle / (Math.PI * 2)) <= progress;
			                fill(lit ? activeColor : bgColor);
			                rect(startX + x * pixelSize, startY + y * pixelSize, pixelSize, pixelSize);
			            }
			        }
			    }
			}
			
			function drawLaserIndicator() {
			    var cx = Math.round(playerX + playerWidth / 2);
			    var cy = Math.round(playerY - 26);
			    var diameter = 15;
			    var px = 3;
			
			    if (pullOut) {
			        var elapsed = pullDuration - pullTimer;
			        var progress = Math.max(0, Math.min(1, elapsed / pullDuration));
			        drawPixelArc(cx, cy, diameter, px, progress, color(250, 210, 40), color(250, 210, 40));
			        return;
			    }
			    if (shootCooldown > 0) {
			        var readyRatio = 1 - (shootCooldown / 120);
			        drawPixelArc(cx, cy, diameter, px, readyRatio, color(120, 200, 80), color(60, 60, 60));
			        return;
			    }
			    // fully ready
			    drawPixelArc(cx, cy, diameter, px, 1.0, color(120, 200, 80), color(40, 40, 40));
			}

			    drawBarrel(20, 380, 10, 0, true);
			    drawBarrel(430, 280, 10, 0);
			    direction = "right";
			    drawPlayer(230, 300, 10);
			    
			    popMatrix();
			}
			
			function buildStaticMap() {
			    mapLayer = createGraphics(worldW, wrldH, P2D);
			    mapLayer.background(0, 0, 0, 0); // transparent
			
			    // draw ladders behind trusses
			    for (var j = 0; j < ladders.length; j++) {
			        var L = ladders[j];
			        drawLadderG(mapLayer, L.x, (L.y - wrldTop), L.pixelSize, L.h);
			    }
			
			    // draw trusses
			    for (var i = 0; i < trusses.length; i++) {
			        var T = trusses[i];
			        drawTrussG(mapLayer, T.x, (T.y - wrldTop), T.pixelSize, T.length);
			    }
			
			    mapBuilt = true;
			
			
			    try {
			        mapImage = mapLayer.get(); 
			        // println("This thing works?");
			    } catch (e) {
			        mapImage = null; // fall back to drawing mapLayer directly
			    }
			}
			
			buildStaticMap();
			
			// draw function
			draw = function() {
			    
			    // translate based on the camera
			    translate(0, round(cameraY));
			    
			    // background
			    background(0);
			    if (shootCooldown > 0) {
			        shootCooldown--;
			    }
			
			    // handle laser lifetime
			    if (laserActive) {
			        laserFramesLeft--;
			        if (laserFramesLeft <= 0) {
			            laserActive = false;
			        }
			    }
			
			    // update barrel explosion particles (place with other particle updates)
			    for (var bp = barrelParticles.length - 1; bp >= 0; bp--) {
			        var part = barrelParticles[bp];
			        part.x += part.vx;
			        part.y += part.vy;
			        part.vy += 0.25; // gravity
			        part.life--;
			        noStroke();
			        fill(part.color);
			        rect(part.x, part.y, 3, 3);
			        
			        if (part.life <= 0 || part.y > 800) {
			            var dead = barrelParticles[bp];
			            removeAtSwapPop(barrelParticles, bp);
			            barrelParticlePool.push(dead);
			        }
			    }
			
			
			    // camera target
			    var targetY = -playerY + 380;
			    cameraY += (targetY - cameraY) * cameraSmooth; 
			    pushMatrix();
			    // climbing is false
			    climbing = false;
			    // handles ladder collision
			    handleLadders();
			    // sets the best ground 
			    var groundCandidate = computePlayerGround();
			    if (!climbing) {
			        // if we not climbing then apply gravity
			        velocityY += gravity*2;
			        playerY += velocityY*2;
			    } else {
			        // otherwise there is none
			        velocityY = 0;
			    }
			    // more ground stuff
			    if (groundCandidate !== null) {
			        if (playerY >= groundCandidate) {
			            playerY = groundCandidate;
			            velocityY = 0;
			        }
			    }
			        
			    // only move if not shooting
			    if (!pullOut) {
			        if (keys[LEFT] || keys[65]) {
			            direction = "left";
			            playerX -= playerSpeed;
			        } else if (keys[RIGHT] || keys[68]) {
			            direction = "right";
			            playerX += playerSpeed;
			        }
			        if ((keys[UP] || keys[87]) && groundCandidate !== null && playerY >= groundCandidate) {
			            velocityY = -2.2;
			        }
			    } else {
			        animationToggle = 0; 
			    }
			        
			        
			    if (frameCount % (animationDelay*5) === 0) {
			        if (DKdirection === "left") {
			            DKdirection = "right";
			        } else if (DKdirection === "right") {
			            DKdirection = "left";
			        }
			        
			    }
			    var maxEffectiveHeight = 1200;
			    var baseSpawnChance = 0.004;
			    var extraSpawnMax = 0.0267; 
			    
			    var heightFactor = Math.min(1, Math.max(0, (-playerY) / maxEffectiveHeight)); // 0..1
			    var spawnChancePerFrame = baseSpawnChance + heightFactor * extraSpawnMax;
			    
			    if (random() < spawnChancePerFrame && gameState === "playing") {
			        var isLaserProof = (random() < 0.2); // 20% chance
			        barrels.push({
			            x: random(100, 500),
			            y: playerY - 500,
			            pixelSize: 3.5,
			            velocityX: random(2, 6),
			            velocityY: 0,
			            rotation: 0,
			            laserProof: isLaserProof
			        });
			    }
			        
			    
			
			    // draw baked map (one draw call instead of hundreds)
			    if (mapBuilt) {
			        if (mapImage) {
			            image(mapImage, 0, wrldTop);
			        } else if (mapLayer) {
			            image(mapLayer, 0, wrldTop);
			            println("maplayer used.");
			        }
			    }
			    
			    
			    if(playerY < -1100){
			        gameState = "won";
			    }
			    stroke(255);
			    strokeWeight(1);
			    line(0, -1200, 0, -1200);
			    
			    // draw mr kong
			    if (winTimer <= 60) {
			        drawDK(290, -1200, 5);
			        
			        drawPeach(520, -1110, 5);
			        handleBarrels();
			        
			        
			        // ground stuff    
			        var grounded = false;
			        var groundEpsilon = 1; 
			        
			        if (climbing) {
			            grounded = true; 
			        }
			        
			        if (!grounded && groundCandidate !== null && playerY >= groundCandidate - groundEpsilon) {
			            grounded = true;
			        }
			        if (laserActive && gameState === "playing") {
			            var ly = playerY + playerHeight / 2;
			            var lx1 = (direction === "left") ? playerX : (playerX + playerWidth/2);
			            var lx2 = (direction === "left") ? -200 : (width + 200);
			            
			            strokeWeight(4);
			            stroke(200, 20, 20);
			            line(lx1, ly, lx2, ly);
			            // small glow
			            strokeWeight(2);
			            stroke(255, 120, 120);
			            line(lx1, ly, lx2, ly);
			            noStroke();
			        }
			        // Set animation based on grounded + input
			        if (!grounded) {
			            animationToggle = 3;
			        } else {
			            // on ground: walking or idle
			            if (keys[LEFT] || keys[RIGHT] || keys[68] || keys[65]) {
			                if (frameCount % animationDelay === 0) {
			                    animationToggle++;
			                }
			                if (animationToggle > 2 || animationToggle < 0) {
			                    animationToggle = 0;
			                }
			            } else {
			                animationToggle = 0; // idle
			            }
			        }
			        
			        // handle pull-out timer (locks movement while pulling)
			        if (pullOut) {
			            pullTimer--;
			            animationToggle = 4;
			            if (pullTimer <= 0) {
			                pullOut = false;
			                fireLaser();
			            }
			        }
			        
			        
			    }
			    playerX = constrain(playerX, 0, width-45);
			    if(gameState === "playing") {
			        drawLaserIndicator();
			        drawPlayer(playerX, playerY, 3);
			    }
			    else if (gameState === "gameover") {
			        deathTimer ++;
			        // update and draw particles for exploding dk
			        for (var i = 0; i < particles.length; i++) {
			            var p = particles[i];
			            p.x += p.vx;
			            p.y += p.vy;
			            p.vy += 0.2; // gravity
			            
			            noStroke();
			            fill(p.color);
			            rect(p.x, p.y, 4, 4);
			        }
			        
			        
			        // if you dead for long enough then restart the program
			        if (deathTimer > 100) {
			            // just this works on windows & safari
			            resetGame();
			        }
			    }
			    // when you win
			    else if (gameState === "won") {
			        // lock player y onto the top platform
			        playerY = -1088;
			        // hes idle if not yet dancing
			        if(winTimer < 60){
			            animationToggle = 0;
			        }
			        // yay hes dancing
			        else {
			            if(winTimer % 30 === 0) {
			                animationToggle ++;
			            }
			        }
			        if(animationToggle === 3) {
			            animationToggle = 1;
			        }
			        // draw him
			        drawPlayer(playerX, playerY, 3);
			        // add to win timer
			        winTimer++;
			        
			        //  60 frames, trigger DK explosion
			        if (winTimer === 60) {
			            var dkFrame = dkIdle;
			            
			            // repeat color map for kong
			            var dkColorMap = {
			                "r": color(199, 0, 40),
			                "w": color(255),
			                "s": color(255, 195, 170),
			                "b": color(12, 77, 240),
			            };
			            
			            dkParticles = getPixelsFromFrame(dkFrame, 290, -1200, 5, dkColorMap);
			            dancing = true;
			        }
			        
			        // Update DK explosion particles
			        for (var i = 0; i < dkParticles.length; i++) {
			            var p = dkParticles[i];
			            if (!p.vx) {
			                p.vx = random(-4, 4);
			                p.vy = random(-8, -3);
			            }
			            p.x += p.vx;
			            p.y += p.vy;
			            p.vy += 0.2; // gravity
			    
			            noStroke();
			            fill(p.color);
			            rect(p.x, p.y, 4, 4);
			        }
			        
			        // Dancing & text 
			        if (dancing) {
			            textSize(60);
			            textAlign(CENTER, CENTER);
			            fill(200, 255, 0);
			            text("PEACH IS SAVED!", 300, -1300);
			            textSize(40);
			            fill(233, 240, 204);
			            text("DANCE PARTY!", 300, -1250);
			            textSize(20);
			            text("- click to play again -", 300, -1200);
			            // switch their dirrections
			            if (frameCount % 30 === 0) {
			                direction = (direction === "left") ? "right" : "left";
			                kittyDirection = (kittyDirection === "left") ? "right" : "left";
			            }
			            // draw player and peach
			            drawPlayer(playerX, playerY, 3);
			            drawPeach(520, -1110, 5);
			        }
			        
			    }
			    popMatrix();
			    // draw title / how screens on top
			    if (gameState === "title") {
			        drawTitleScreenUI();
			    } else if (gameState === "how") {
			        drawHowScreenUI();
			    }
			    popMatrix();
			    textSize(14);
			    fill(255, 255, 255);
			    text(round(this.__frameRate) + " FPS", width-40, height-20);
			    
			    
			};
			
			// mouse input
			mouseClicked = function() {
			    // If on title/how screens: check buttons in screen coordinates
			    if (gameState === "title") {
			        for (var i = 0; i < titleButtons.length; i++) {
			            var b = titleButtons[i];
			            if (mouseX >= b.x && mouseX <= b.x + b.w && mouseY >= b.y && mouseY <= b.y + b.h) {
			                if (typeof b.action === "function") { b.action(); }
			                return;
			            }
			        }
			    } else if (gameState === "how") {
			        // matches the button
			        var bx = 200, by = 480, bw = 200, bh = 56;
			        if (mouseX >= bx && mouseX <= bx + bw && mouseY >= by && mouseY <= by + bh) {
			            gameState = "title";
			            return;
			        }
			    } else if (gameState === "gameover" || gameState === "won") {
			        resetGame();
			    }
			};
			
			// key input
			keyPressed = function() {
			    keys[keyCode] = true;
			    
			    // SPACE
			    if (keyCode === 32 && shootCooldown <= 0 && gameState === "playing" && !pullOut && !laserActive) {
			        // begin pull-out; movement locked until pullTimer reaches 0
			        pullOut = true;
			        pullTimer = pullDuration;
			        shootCooldown = 120; 
			    }
			};
			
			keyReleased = function() {
			    keys[keyCode] = false;
			};
			
			
		}
		
		runPJS(program);
		
		// Add reload button on KA --> <script>
		
	</script>
</body>
